# Allows for the definition of PR and Issue /commands
name: '📟 Slash Command Dispatcher'

on:
  issue_comment:
    types:
      - created

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/command-dispatch.yaml@c253bb2877fe640646e18ceeee30441659ac0775 # master
    secrets:
      token: ${{ secrets.JF_BOT_TOKEN }}
