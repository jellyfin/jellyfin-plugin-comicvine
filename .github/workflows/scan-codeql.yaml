name: '🔬 Run CodeQL'

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  schedule:
    - cron: '24 2 * * 4'
  workflow_dispatch:

jobs:
  call:
    if: false
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/scan-codeql.yaml@c253bb2877fe640646e18ceeee30441659ac0775 # master
    with:
      repository-name: jellyfin/jellyfin-plugin-comicvine
