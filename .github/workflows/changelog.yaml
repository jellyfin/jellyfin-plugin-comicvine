    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/changelog.yaml@c253bb2877fe640646e18ceeee30441659ac0775 # master
    with:
      repository-name: jellyfin/jellyfin-plugin-comicvine
    secrets:
      token: ${{ secrets.JF_BOT_TOKEN }}
